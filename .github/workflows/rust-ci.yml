name: Rust CI

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "src-tauri/**"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    paths:
      - "src-tauri/**"
      - ".github/workflows/rust-ci.yml"

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 GLIBC (native)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            use_cross: false
          # Linux x86_64 MUSL (cross)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            use_cross: true
          # Linux ARM64 MUSL (cross)
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            use_cross: true
          # macOS ARM64 (native)
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          # macOS x86_64 (cross-compile on ARM64 runner)
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system deps
        if: runner.os == 'Linux' && matrix.use_cross == false
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.1"
          targets: ${{ matrix.target }}
          components: clippy

      ## src-tauri/rust-toolchain.toml pins a different stable toolchain.
      ## dtolnay/rust-toolchain installs targets for 1.91.1, but cargo
      ## invoked under src-tauri/ switches to the pinned stable which does
      ## NOT inherit those targets.  Add the target explicitly.
      - name: Ensure target on rust-toolchain.toml stable
        if: matrix.use_cross == false
        shell: bash
        working-directory: src-tauri
        run: rustup target add ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: build-${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Create frontend dist placeholder
        run: mkdir -p dist
        shell: bash

      # - name: Run Clippy
      #   working-directory: src-tauri
      #   continue-on-error: true
      #   run: cargo clippy -- -D warnings

      - name: Build with cross
        if: matrix.use_cross == true
        working-directory: src-tauri
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: matrix.use_cross == false
        working-directory: src-tauri
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cc-switch-tui-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/cc-switch
          if-no-files-found: error

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.1"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: test-${{ matrix.os }}

      - name: Run tests
        working-directory: src-tauri
        continue-on-error: true
        run: cargo test

  failover-e2e:
    name: failover E2E test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.1"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: failover-e2e

      - name: Create frontend dist placeholder
        run: mkdir -p dist

      - name: Run failover E2E test
        working-directory: src-tauri
        run: |
          sandbox_home="$(mktemp -d)"
          export HOME="$sandbox_home"
          export USERPROFILE="$sandbox_home"
          export CC_SWITCH_CONFIG_DIR="$sandbox_home/.cc-switch"
          cargo test --test proxy_claude_forwarder_alignment proxy_claude_auto_failover_uses_activated_queue_providers -- --exact --nocapture
